@let cls = rootClass();
@let v = variant();
@let t = text();
@let aria = resolvedAriaLabel();

<div [class]="cls" role="status" [attr.aria-label]="aria">
  <span class="loading-indicator__visual" aria-hidden="true">
    @switch (v) {
      @case ('line-simple') {
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="22 88" />
        </svg>
      }
      @case ('line-spinner') {
        <svg viewBox="0 0 32 32" fill="none">
          <defs>
            <linearGradient id="ld-line-spinner" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="currentColor" stop-opacity="0" />
              <stop offset="100%" stop-color="currentColor" stop-opacity="1" />
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="14"
                  stroke="url(#ld-line-spinner)"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-dasharray="66 88" />
        </svg>
      }
      @case ('dot-circle') {
        <svg viewBox="0 0 32 32" fill="none">
          @for (i of dots; track i) {
            <circle
              cx="16"
              cy="3"
              r="1.5"
              fill="currentColor"
              [attr.transform]="'rotate(' + (i * 30) + ' 16 16)'"
              [style.--_i]="i" />
          }
        </svg>
      }
    }
  </span>
  @if (t) {
    <span class="loading-indicator__text">{{ t }}</span>
  }
</div>
