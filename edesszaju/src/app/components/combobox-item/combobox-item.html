@let cls = rootClass();
@let isSelected = selected();
@let isDisabled = disabled();
@let aria = resolvedAriaLabel();

<button
  [class]="cls"
  [type]="type()"
  [disabled]="isDisabled"
  role="option"
  [attr.aria-selected]="isSelected ? 'true' : 'false'"
  [attr.aria-disabled]="isDisabled ? 'true' : null"
  [attr.aria-label]="aria"
  (click)="onClick($event)">
  <span class="combobox-item__leading">
    <ng-content select="[leading]" />
  </span>

  <span class="combobox-item__text">
    <span class="combobox-item__title">{{ title() }}</span>
    @if (subtitle(); as s) {
      <span class="combobox-item__subtitle">{{ s }}</span>
    }
  </span>

  @if (isSelected) {
    <svg class="combobox-item__check" viewBox="0 0 14 14" fill="none" aria-hidden="true">
      <path d="M11.6667 3.5L5.25 9.91667L2.33333 7"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round" />
    </svg>
  }
</button>
