@let cls = rootClass();

<button
  [class]="cls"
  type="button"
  [disabled]="disabled()"
  [attr.aria-label]="ariaLabel()"
  (click)="onClick($event)">
  <svg class="tag-close__glyph" viewBox="0 0 12 12" fill="none" aria-hidden="true">
    <path d="M9 3L3 9M3 3L9 9"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round" />
  </svg>
</button>
