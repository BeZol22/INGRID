<app-tooltip
  [text]="text()"
  [supportingText]="supportingText()"
  [placement]="placement()"
  [align]="align()"
  [arrow]="arrow()"
  [disabled]="disabled()"
  [delay]="delay()">
  <button
    class="help-icon"
    type="button"
    [attr.aria-label]="ariaLabel()"
    [disabled]="disabled()">
    <svg
      class="help-icon__glyph"
      viewBox="0 0 16 16"
      fill="none"
      aria-hidden="true">
      <circle cx="8" cy="8" r="6.667"
              stroke="currentColor"
              stroke-width="1.333" />
      <path d="M6.062 6.001a2 2 0 0 1 3.886.665c0 1.334-2 2-2 2"
            stroke="currentColor"
            stroke-width="1.333"
            stroke-linecap="round"
            stroke-linejoin="round" />
      <circle cx="8" cy="11.333" r="0.667" fill="currentColor" />
    </svg>
  </button>
</app-tooltip>
