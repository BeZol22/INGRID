name: Deploy Édesszájú to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edesszaju
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edesszaju/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (base-href = /INGRID/)
        run: npx ng build --base-href /INGRID/

      - name: Add .nojekyll
        run: touch dist/edesszaju/browser/.nojekyll

      - name: SPA fallback (copy index.html to 404.html)
        run: cp dist/edesszaju/browser/index.html dist/edesszaju/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: edesszaju/dist/edesszaju/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
